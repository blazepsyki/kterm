[graph]
all-features = true

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "BSL-1.0",
  "CC0-1.0",
  "Unlicense",
  "NCSA",
  "MPL-2.0",
  "0BSD",
  "OpenSSL"
]
confidence-threshold = 0.8
exceptions = [
  { allow = ["MIT", "GPL-3.0-only"], crate = "unescaper" }
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
